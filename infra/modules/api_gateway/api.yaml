openapi: 3.0.1
info:
  title: e-commarce-shop-api
  description: REST API Gateway for e-commarce-shop
  version: 1.0.0

paths:
  /upload-product:
    post:
      summary: Upload a new product
      responses:
        "200":
          description: OK
      security:
        - cognito_auth: [] 
      x-amazon-apigateway-integration:
        uri: ${upload_product_lambda_uri}
        httpMethod: POST
        type: aws_proxy
        timeoutInMillis: 12000

components:
  securitySchemes:
    cognito_auth:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: "cognito_user_pools"
      x-amazon-apigateway-authorizer:
        type: "cognito_user_pools"
        providerARNs:
          - "${cognito_user_pool_arn}"