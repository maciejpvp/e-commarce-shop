openapi: 3.0.1
info:
  title: e-commarce-shop-api
  description: REST API Gateway for e-commarce-shop
  version: 1.0.0

paths:
%{ for ep in endpoints }
  ${ep.endpoint}:
    ${lower(ep.type)}:
      summary: API Endpoint for ${ep.endpoint}
%{ if length(regexall("\\{([^}]+)\\}", ep.endpoint)) > 0 }
      parameters:
%{ for match in regexall("\\{([^}]+)\\}", ep.endpoint) }
        - name: ${match[0]}
          in: path
          required: true
          schema:
            type: string
%{ endfor }
%{ endif }
      responses:
        "200":
          description: OK
      security:
        - custom_lambda_auth: []
      x-required-groups: ${jsonencode(ep.permissions)}
      x-amazon-apigateway-integration:
        uri: ${ep.lambda}
        httpMethod: POST
        type: aws_proxy
        timeoutInMillis: 12000
%{ endfor }

components:
  securitySchemes:
    custom_lambda_auth:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: "authorizer"
      x-amazon-apigateway-authorizer:
        authorizerUri: ${authorizer_lambda_invoke_arn}
        authorizerResultTtlInSeconds: 300
        type: token