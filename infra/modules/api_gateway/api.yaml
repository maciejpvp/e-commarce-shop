openapi: 3.0.1
info:
  title: e-commarce-shop-api
  description: HTTP API Gateway for e-commarce-shop
  version: 1.0.0

paths:
  /upload-product:
    post:
      summary: Upload a new product
      responses:
        default:
          description: Default response
      security:
        - cognito: []
      x-amazon-apigateway-integration:
        uri: ${upload_product_lambda_uri}
        httpMethod: POST
        type: aws_proxy
        payloadFormatVersion: "2.0"
        timeoutInMillis: 12000

components:
  securitySchemes:
    cognito:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authorizer:
        type: jwt
        identitySource: $request.header.Authorization
        jwtConfiguration:
          audience:
            - ${cognito_audience}
          issuer: ${cognito_issuer}

x-amazon-apigateway-cors:
  allowHeaders:
    - content-type
    - x-amz-date
    - authorization
    - x-api-key
    - x-amz-security-token
    - x-amz-user-agent
  allowMethods:
    - "*"
  allowOrigins:
    - "*"
