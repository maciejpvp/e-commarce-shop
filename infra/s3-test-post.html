<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>S3 Presigned POST - Tester</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f7f6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }

        h2 {
            color: #333;
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin: 10px 0;
            font-family: monospace;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            box-sizing: border-box;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .btn:hover {
            background: #0056b3;
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            white-space: pre-wrap;
            font-size: 14px;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>S3 Upload Tester</h2>

        <label>1. Endpoint S3 (Upload URL):</label>
        <input type="text" id="url" value="https://ecommerce-product-media-dev.s3.eu-central-1.amazonaws.com/">

        <label>2. Wklej tutaj string "fields":</label>
        <textarea id="rawFields" placeholder='Wklej tutaj: "{\"x-amz-meta-ismain\":\"true\"...}"'></textarea>

        <label>3. Wybierz plik (obrazek):</label>
        <input type="file" id="filePicker" style="margin: 20px 0; display: block;">

        <button class="btn" onclick="handleUpload()">Wyślij do S3</button>

        <div id="status"></div>
    </div>

    <script>
        async function handleUpload() {
            const url = document.getElementById('url').value;
            const rawInput = document.getElementById('rawFields').value.trim();
            const fileInput = document.getElementById('filePicker');
            const status = document.getElementById('status');

            if (!fileInput.files[0]) {
                alert("Wybierz plik!");
                return;
            }

            try {
                // Logika czyszczenia "escaped quotes" i parsowania
                let fields;
                try {
                    // Najpierw próbujemy sparsować jako zwykły JSON
                    const parsed = JSON.parse(rawInput);
                    // Jeśli wynik to string (bo wkleiłeś "{\"...\")", parsujemy go drugi raz
                    fields = (typeof parsed === 'string') ? JSON.parse(parsed) : parsed;
                } catch (e) {
                    // Jeśli wkleiłeś tekst bez otaczających cudzysłowów, ale z \", usuwamy je ręcznie
                    const cleaned = rawInput.replace(/\\"/g, '"').replace(/^"/, '').replace(/"$/, '');
                    fields = JSON.parse(cleaned);
                }

                const formData = new FormData();

                // S3 WYMAGA, aby pola były dodane PRZED plikiem
                Object.entries(fields).forEach(([key, value]) => {
                    formData.append(key, value);
                });

                // Dodajemy Content-Type zgodny z plikiem (wymagane przez Twoją politykę: starts-with image/)
                formData.append('Content-Type', fileInput.files[0].type);

                // Plik musi być OSTATNIM polem w FormData
                formData.append('file', fileInput.files[0]);

                status.style.display = 'block';
                status.className = '';
                status.innerText = "Wysyłanie...";

                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                const responseBody = await response.text();

                if (response.ok) {
                    status.className = 'success';
                    status.innerText = "Sukces! S3 zwrócił status 204 (No Content) lub 200 OK.\n" + responseBody;
                } else {
                    status.className = 'error';
                    status.innerText = `Błąd S3 (${response.status}):\n${responseBody}`;
                }

            } catch (err) {
                status.style.display = 'block';
                status.className = 'error';
                status.innerText = "Błąd JavaScript: " + err.message;
            }
        }
    </script>

</body>

</html>
